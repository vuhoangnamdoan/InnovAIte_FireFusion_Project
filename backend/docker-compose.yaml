services:

  firefusion-api: # api
    profiles: ["default", "firefusion"]
    image: firefusion/firefusion-api
    build: ./firefusion-api/.
    ports: 
      - 80:80
    depends_on:
      broker:
        condition: service_healthy 
      cache:
        condition: service_healthy
    environment:
      BROKER_URL: amqp://guest:guest@broker:5672
      CACHE_URL: redis://cache:6379
      PYTHONUNBUFFERED: 1

  model-api: # api
    profiles: ["default"]
    image: firefusion/model-api
    build: ./model-api/.
    ports: 
      - 81:80
    depends_on:
      broker:
        condition: service_healthy 
    environment:
      BROKER_URL: amqp://guest:guest@broker:5672

  aggregator-api: # api
    profiles: ["default", "aggregator"]
    image: firefusion/aggregator-api
    build: ./aggregator-api/.
    ports: 
      - 82:80
    depends_on:
      relational-db:
        condition: service_healthy 
      broker:
        condition: service_healthy 
    environment:
      RELATIONAL_DB_URL: postgresql://postgres:postgres@relational-db:5432/postgres
      BROKER_URL: amqp://guest:guest@broker:5672

  relational-db: # relational database
    profiles: ["default", "aggregator"]
    image: postgres:18
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      # init will do 01 then 02 
      # (create tables then seed them)
      - ./utilities/aggregator-init.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./utilities/seed-aggregator.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"

  broker: # message broker
    profiles: ["default", "aggregator", "firefusion"]
    image: rabbitmq:4.3-rc-management # image has mangement ui
    ports:
      - 5672:5672
      - 15672:15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 3s
      retries: 5

  cache:
    profiles: ["default", "firefusion"]
    image: redis:8.6.2
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
